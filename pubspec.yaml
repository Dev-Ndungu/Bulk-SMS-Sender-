name: bulk_sms
description: "Bulk SMS sender for Kenyan phone numbers – Material Design 3."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Local storage
  hive_flutter: ^1.1.0

  # Contacts
  flutter_contacts: ^1.1.7+1

  # Secure storage for API keys
  flutter_secure_storage: ^9.2.2

  # HTTP client
  http: ^1.2.2

  # Navigation
  go_router: ^14.6.2

  # Permissions
  permission_handler: ^11.3.1

  # Sharing / export
  share_plus: ^10.0.3

  # Network connectivity
  connectivity_plus: ^6.0.5

  # Internationalisation & date formatting
  intl: ^0.19.0

  # UUID generation
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
